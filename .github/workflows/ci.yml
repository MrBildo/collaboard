name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'release/*']

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore backend/Collaboard.sln
      - name: Build
        run: dotnet build backend/Collaboard.sln --no-restore
      - name: Test
        run: dotnet test backend/ --no-build --verbosity normal

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Type check
        run: npx tsc -b
        working-directory: frontend
      - name: Test
        run: npm run test
        working-directory: frontend
      - name: Build
        run: npx vite build
        working-directory: frontend
