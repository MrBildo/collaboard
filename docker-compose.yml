services:
  api:
    build:
      context: ./backend/Collaboard.Api
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api
